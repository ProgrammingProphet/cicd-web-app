
# Nginx configuration with SSL support.
# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ilikeyou.in www.ilikeyou.in;

    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name ilikeyou.in www.ilikeyou.in;

    # SSL certificate paths (generated by certbot)
    ssl_certificate /etc/letsencrypt/live/ilikeyou.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ilikeyou.in/privkey.pem;

    # Root directory of your website
    root /usr/share/nginx/html;
    index index.html;

    # SPA / static file routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}



