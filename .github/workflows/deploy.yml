name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: cicd-web-app

jobs:
  # -------------------------------
  # CI: Build & Push Docker Image
  # -------------------------------
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # -------------------------------
  # CD: Deploy Application
  # -------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            # echo "Checking Docker installation..."

            # if ! command -v docker &> /dev/null
            # then
            #     echo "Docker not found. Installing Docker..."

            #     sudo apt update
            #     sudo apt install -y docker.io

            #     sudo systemctl start docker
            #     sudo systemctl enable docker

            #     sudo usermod -aG docker $USER
            # else
            #     echo "Docker already installed"
            # fi

            echo "Pull latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-web-app:latest

            echo "Stopping old container..."
            docker stop cicd-web-app || true
            docker rm cicd-web-app || true

            echo "Starting new container..."
            docker run -d \
              -p 80:80 \
              -p 443:443 \
              -restart unless-stopped \
              --name cicd-web-app \
              ${{ secrets.DOCKER_USERNAME }}/cicd-web-app:latest
